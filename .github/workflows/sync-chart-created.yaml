name: Sync Chart Created
on:
  repository_dispatch:
    types:
      - chart-created
  workflow_dispatch:
    inputs:
      browser_download_url:
        description: 'Browser download URL for the chart package'
        required: true
        type: string
      chart:
        description: 'Chart name'
        required: true
        type: string
      version:
        description: 'Chart version'
        required: true
        type: string

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BROWSER_DOWNLOAD_URL: ${{ github.event.client_payload.browser_download_url || github.event.inputs.browser_download_url }}
      CHART_NAME: ${{ github.event.client_payload.chart || github.event.inputs.chart }}
      CHART_VERSION: ${{ github.event.client_payload.version || github.event.inputs.version }}

    steps:
      - name: Set up Go 1.21.x
        uses: actions/setup-go@v4
        with:
          go-version: 1.21.x
        id: go
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.KUADRANT_DEV_PAT }}
          fetch-depth: 0
      - name: Get chart package
        working-directory: ${{ github.workspace }}
        run: |
          make get-chart \
            BROWSER_DOWNLOAD_URL="${{ env.BROWSER_DOWNLOAD_URL }}" \
            CHART_NAME="${{ env.CHART_NAME }}" \
            CHART_VERSION="${{ env.CHART_VERSION }}"
      - name: Update local index
        run: |
          make helm-index
      - name: Commit the changes
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add charts
          git commit -m "Sync created chart ${{ env.CHART_NAME }} version ${{ env.CHART_VERSION }}"
          git push
